holo:
  generation_root: "${VARMDYN_MD_GENERATION_ROOT:-/scratch/$USER/VarMDyn/data/md}/holo"
  project_root: "${VARMDYN_MD_PROJECT_ROOT:-/path/to/hpc_project/VarMDyn/data/md}/holo"
  apo_generation_root: "${VARMDYN_MD_GENERATION_ROOT:-/scratch/$USER/VarMDyn/data/md}/apo"
  variants_dir: "variants"
  run_dir: "."
  logs_dir: "logs"
  protocol_dir: "protocol"
  varmodel_root: "${VARMDYN_VARMODEL_ROOT:-data/varmodel}"

  variants: all
  variant_aliases: {}

  replicas:
    - cr1
    - cr2
    - cr3

  production:
    chunk_ns: 100
    start_chunk: 25
    completed_chunks: [25, 26, 27, 28, 29]
    default_target_ns: 500
    extension_target_ns: 1000
    completion_token: "NSTEP = 50000000"

  prepared_trajectories:
    replica_sample_stride: 20
    canonical_network_frames: 750
    canonical_network_window: "25-29"
    canonical_network_source: "04.ptraj/com/concatenated"
    keep_ligand_variant: "keepATPmg"
    reuse_rule: "prepare once in project partition; analysis reads prepared outputs"

  stages:
    handoff: "python workflows/md/handoff.py --state holo"
    seed: "bash workflows/md/holo/scripts/seed.sh"
    transfer: "bash workflows/md/holo/scripts/transfer.sh"
    transfer_check: "bash workflows/md/holo/scripts/validate.sh"
    prepare: "bash workflows/md/holo/scripts/prepare.sh"
    leap: "bash workflows/md/holo/scripts/leap.sh"
    leap_submit: "bash workflows/md/holo/scripts/leap.sh --submit"
    eq_layout: "bash workflows/md/holo/scripts/eq_layout.sh"
    eq_submit: "bash workflows/md/holo/scripts/eq.sh"
    restart: "bash workflows/md/holo/scripts/restart.sh"
    prod: "bash workflows/md/holo/scripts/prod.sh"
    full_submit: "python workflows/md/submit.py --mode full --array --run-root ${VARMDYN_MD_GENERATION_ROOT:-/scratch/$USER/VarMDyn/data/md}/holo --start ${VARMDYN_MD_PROD_START:-25} --end ${VARMDYN_MD_PROD_END:-29}"
    validate_short: "python workflows/md/validate.py --state holo --variants ${VARMDYN_MD_VALIDATE_VARIANTS:-WT}"
    prod_plan: "python workflows/md/trajectory.py --state holo --action plan"
    prepared_plan: "python workflows/md/trajectory.py --state holo --action prepared-plan"
    sync_project: "python workflows/md/storage.py --state holo --variants all --action sync-project --verify"
    restore_scratch: "python workflows/md/storage.py --state holo --variants all --action restore-scratch --verify"

  stage_aliases:
    stage0_seed: seed
    stage0_transfer: transfer
    stage0_validate: transfer_check
    stage1_prepare: prepare
    stage1_leap: leap
    stage1_leap_submit: leap_submit
    stage2_prepare_eq: eq_layout
    stage2_submit_eq: eq_submit
    stage3_copy_restart: restart
    stage3_submit_prod: prod

  gates:
    transfer:
      - "ligprep/cdl.prot.noH.pdb"
      - "ligprep/ligand-only-from-complex-atponly.pdb"
      - "ligprep/mg-only-from-complex-mgonly.pdb"
      - "ligprep/transfer_kinase_context.png"
      - "ligprep/transfer_ligand_zoom.png"
      - "ligprep/transfer_core_30_220_overlay.png"
    leap:
      - "02.leap/com/cdl.com.gas.leap.prmtop"
      - "02.leap/com/cdl.com.gas.leap.inpcrd"
      - "02.leap/com/cdl.com.gas.leap.pdb"
      - "02.leap/com/cdl.com.wat.leap.prmtop"
      - "02.leap/com/cdl.com.wat.leap.inpcrd"
      - "02.leap/com/cdl.com.wat.leap.pdb"
    eq:
      - "03.pmemd/com/cr1/24md.mdout"

  gate_aliases:
    stage0: transfer

  prod_file: "03.pmemd/com/{replica}/29md.mdout"
  prod_token: "NSTEP = 50000000"
