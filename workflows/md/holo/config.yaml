holo:
  generation_root: "${VARMDYN_MD_GENERATION_ROOT:-/scratch/$USER/VarMDyn/data/md}/holo"
  project_root: "${VARMDYN_MD_PROJECT_ROOT:-/path/to/hpc_project/VarMDyn/data/md}/holo"
  apo_generation_root: "${VARMDYN_MD_GENERATION_ROOT:-/scratch/$USER/VarMDyn/data/md}/apo"
  run_dir: "systems"
  logs_dir: "logs"
  protocol_dir: "protocol"
  varmodel_root: "${VARMDYN_VARMODEL_ROOT:-data/varmodel}"

  variants:
    - 01_WT
    - 02_L119R
    - 03_D193H
    - 04_G202E
    - 05_Q219K
    - 06_C291Y

  replicas:
    - cr1
    - cr2
    - cr3

  production:
    chunk_ns: 100
    start_chunk: 25
    completed_chunks: [25, 26, 27, 28, 29]
    default_target_ns: 500
    extension_target_ns: 1000
    completion_token: "NSTEP = 50000000"

  prepared_trajectories:
    replica_sample_stride: 20
    canonical_network_frames: 750
    canonical_network_window: "25-29"
    canonical_network_source: "04.ptraj/com/concatenated"
    keep_ligand_variant: "keepATPmg"
    reuse_rule: "prepare once in project partition; analysis reads prepared outputs"

  stages:
    handoff: "python workflows/md/handoff.py --state holo"
    stage0_seed: "bash workflows/md/holo/scripts/seed.sh"
    stage0_transfer: "bash workflows/md/holo/scripts/transfer.sh"
    stage0_validate: "bash workflows/md/holo/scripts/validate.sh"
    stage1_prepare: "bash workflows/md/holo/scripts/prepare.sh"
    stage1_leap: "bash workflows/md/holo/scripts/leap.sh"
    stage2_prepare_eq: "bash workflows/md/holo/scripts/eq_layout.sh"
    stage2_submit_eq: "bash workflows/md/holo/scripts/eq.sh"
    stage3_copy_restart: "bash workflows/md/holo/scripts/restart.sh"
    stage3_submit_prod: "bash workflows/md/holo/scripts/prod.sh"
    full_submit: "python workflows/md/submit.py --mode full --run-root ${VARMDYN_MD_GENERATION_ROOT:-/scratch/$USER/VarMDyn/data/md}/holo/systems --start ${VARMDYN_MD_PROD_START:-25} --end ${VARMDYN_MD_PROD_END:-29}"
    prod_plan: "python workflows/md/trajectory.py --state holo --action plan"
    prepared_plan: "python workflows/md/trajectory.py --state holo --action prepared-plan"
    sync_project: "rsync -a --info=progress2 ./ ${VARMDYN_MD_PROJECT_ROOT:-/path/to/hpc_project/VarMDyn/data/md}/holo/"

  gates:
    stage0:
      - "ligprep/cdl.prot.noH.pdb"
      - "ligprep/ligand-only-from-complex-atponly.pdb"
      - "ligprep/mg-only-from-complex-mgonly.pdb"
    leap:
      - "02.leap/com/cdl.com.gas.leap.prmtop"
      - "02.leap/com/cdl.com.gas.leap.inpcrd"
      - "02.leap/com/cdl.com.gas.leap.pdb"
      - "02.leap/com/cdl.com.wat.leap.prmtop"
      - "02.leap/com/cdl.com.wat.leap.inpcrd"
      - "02.leap/com/cdl.com.wat.leap.pdb"
    eq:
      - "03.pmemd/com/cr1/24md.mdout"

  prod_file: "03.pmemd/com/{replica}/29md.mdout"
  prod_token: "NSTEP = 50000000"
