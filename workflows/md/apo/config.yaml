apo:
  generation_root: "${VARMDYN_MD_GENERATION_ROOT:-/scratch/$USER/VarMDyn/data/md}/apo"
  project_root: "${VARMDYN_MD_PROJECT_ROOT:-/path/to/hpc_project/VarMDyn/data/md}/apo"
  variants_dir: "variants"
  run_dir: "."
  logs_dir: "logs"
  protocol_dir: "protocol"
  varmodel_root: "${VARMDYN_VARMODEL_ROOT:-data/varmodel}"

  variants: all
  variant_aliases: {}

  replicas:
    - cr1
    - cr2
    - cr3

  production:
    chunk_ns: 100
    start_chunk: 25
    completed_chunks: [25, 26, 27, 28, 29]
    default_target_ns: 500
    extension_target_ns: 1000
    completion_token: "NSTEP = 50000000"

  prepared_trajectories:
    replica_sample_stride: 20
    canonical_network_frames: 750
    canonical_network_window: "25-29"
    canonical_network_source: "04.ptraj/com/concatenated"
    reuse_rule: "prepare once in project partition; analysis reads prepared outputs"

  stages:
    handoff: "python workflows/md/handoff.py --state apo"
    prep: "bash workflows/md/apo/scripts/prep.sh"
    leap: "bash workflows/md/apo/scripts/leap.sh"
    leap_submit: "bash workflows/md/apo/scripts/leap.sh --submit"
    eq_cr1: "bash workflows/md/apo/scripts/eq.sh"
    copy_restart: "bash workflows/md/apo/scripts/restart.sh"
    restart: "bash workflows/md/apo/scripts/restart.sh"
    prod: "bash workflows/md/apo/scripts/prod.sh"
    full_submit: "python workflows/md/submit.py --mode full --array --run-root ${VARMDYN_MD_GENERATION_ROOT:-/scratch/$USER/VarMDyn/data/md}/apo --start ${VARMDYN_MD_PROD_START:-25} --end ${VARMDYN_MD_PROD_END:-29}"
    validate_short: "python workflows/md/validate.py --state apo --variants ${VARMDYN_MD_VALIDATE_VARIANTS:-WT}"
    prod_plan: "python workflows/md/trajectory.py --state apo --action plan"
    prepared_plan: "python workflows/md/trajectory.py --state apo --action prepared-plan"
    sync_project: "python workflows/md/storage.py --state apo --variants all --action sync-project --verify"
    restore_scratch: "python workflows/md/storage.py --state apo --variants all --action restore-scratch --verify"

  stage_aliases:
    prepare: prep
    eq_submit: eq_cr1

  gates:
    prep:
      - "01.prep/cdl.prot.noH.pdb"
    leap:
      - "02.leap/com/cdl.com.gas.leap.prmtop"
      - "02.leap/com/cdl.com.gas.leap.inpcrd"
      - "02.leap/com/cdl.com.gas.leap.pdb"
      - "02.leap/com/cdl.com.wat.leap.prmtop"
      - "02.leap/com/cdl.com.wat.leap.inpcrd"
      - "02.leap/com/cdl.com.wat.leap.pdb"
    eq:
      - "03.pmemd/com/cr1/24md.mdout"

  prod_file: "03.pmemd/com/{replica}/29md.mdout"
  prod_token: "NSTEP = 50000000"
